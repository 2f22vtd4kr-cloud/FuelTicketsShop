kind = "web"
previewPath = "/"
title = "ТОПливо — Fuel Vouchers"
version = "1.0.0"
id = "artifacts/toplivo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21641

[services.development]
run = "pnpm --filter @workspace/toplivo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toplivo", "run", "build" ]
publicDir = "artifacts/toplivo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21641"
BASE_PATH = "/"
